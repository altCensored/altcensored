{% extends 'base.html' %}
{% block head %}

{% endblock %}
{% block content %}

{% with active_nav='auth' %}
    {% include "widgets/navtabs.html" %}
{% endwith %}

<br>
<div class="pure-g">
  <div class="pure-u-1 pure-u-md-2-24"></div>
  <div class="pure-u-1 pure-u-md-20-24">
    <div class="pure-g">
      <div class="pure-u-1 pure-u-md-1-1">
        <div class="h-box">
          <form class="pure-form pure-form-aligned" method="post">
            <fieldset>
              <div class="pure-control-group">
                <label for="email">Email:</label>
                <input name="email" id="email" required>
              </div>
              <div class="pure-control-group">
                <label for="password">Password:</label>
                <input type="password" name="password" id="password">
              </div>
              <div class="pure-controls">
                <button type="submit" name="submitvalue" value="login">Log In</button>
                <button type="submit" name="submitvalue" value="register">Register</button>
                &nbsp;
                <button type="submit" name="submitvalue" value="reset">Reset Password</button>
              </div>
            </fieldset>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
