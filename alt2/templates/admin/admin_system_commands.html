{% extends 'base.html' %}
{% block head %}

{% endblock %}
{% block content %}

{% with active_nav='admin' %}
    {% include "widgets/navtabs.html" %}
{% endwith %}

<br>

<div class="pure-g">
  <div class="pure-u-1 pure-u-md-2-24"></div>
  <div class="pure-u-1 pure-u-md-20-24">
    <div class="pure-g">
      <div class="pure-u-1 pure-u-md-1-1">
        <div class="h-box">
        <h2>{{title}}</h2>
        <form method=post enctype=multipart/form-data>
          <label for="sys_name">System Name:</label>
          <select name=sys_name>
            <option value=scraper>scraper</option>"
            <option value=web>web</option>"
            <option value=dbase>dbase</option>"
            <option value=images>images</option>"
          </select>&nbsp;
          <label for="cmd_name">Command:</label>
          <select name=cmd_name>
            <option value='uptime'>uptime</option>"
            <option value='init 6'>reboot</option>"
            <option value='apt update -y && apt upgrade -y && apt autoremove -y'>update</option>"
            <option value='./ssh_here_backup.sh'>backup</option>"
            <option value='ls -lrt'>ls</option>"
            <option value=systemctl>systemctl</option>"
          </select>&nbsp;
          <input type=submit value=Return>
          <br><br>
          <label for="action_name">Action:</label>
          <select name=action_name>
            <option value=status>status</option>"
            <option value=stop>stop</option>"
            <option value=restart>restart</option>"
          </select>&nbsp;
          <label for="subsys_name">Subsystem:</label>
          <select name=subsys_name>
            <option value=allsync>allsync</option>"
            <option value=find_archive>find_archive</option>"
            <option value=channel_archive>channel_archive</option>"
            <option value=gunicorn>gunicorn</option>"
            <option value=pgsync>pgsync</option>"
            <option value=nginx>nginx</option>"
            <option value=postgresql>postgresql</option>"
            <option value=imageproxy>imageproxy</option>"
          </select>
          <br><br>
        </form>
        </div>
      </div>
    </div>
  </div>
</div>

<p></p>
{% endblock %}
