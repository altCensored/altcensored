{% extends 'base.html' %}
{% block head %}

{% endblock %}
{% block content %}

{% with active_nav='user' %}
    {% include "widgets/navtabs.html" %}
{% endwith %}

<br>
<div class="pure-g">
  <div class="pure-u-1 pure-u-md-2-24"></div>
    <div class="pure-u-1 pure-u-md-20-24">
      <form class="pure-form pure-form-aligned" method="post">
        <fieldset>
          <div class="pure-controls">
            Are you sure you want to unsubscribe <b>{{ email }}</b>?
            <input type="hidden" id="emailvalue" name="emailvalue" value="{{ email }}">
          </div>
          <div class="pure-controls">
            <button class="pure-button" type="submit" name="submitvalue" value="unsubscribe">{{ gettext('Unsubscribe') }}</button>
            <button class="pure-button" type="submit" name="submitvalue" value="cancel">{{ gettext('Cancel') }}</button>
          </div>
        </fieldset>
      </form>
    </div>
  </div>
</div>

{% endblock %}
