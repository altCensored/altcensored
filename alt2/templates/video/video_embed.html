<!DOCTYPE html>

<head>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/darktheme.css') }}">

</head>

<html>


<video preload="auto" playsinline outline="none" controls
style="outline:none;
    background-color:#000;
    background-size:cover;
    display: inline-block;
    vertical-align: middle;
    background-repeat: no-repeat;
    background-position: 50% 50%;
    margin: 0;
    padding: 0;
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
    height: 100%;
    width: 100%;
    overflow-wrap: break-word;
    word-wrap: break-word;"

  poster="{{ ia_url }}.jpg">

  <source
    src="{{ ia_url }}.mkv"
    type="video/mp4">
  <source
    src="{{ ia_url }}.mp4"
    type="video/mp4">
  <source
    src="{{ ia_url }}.ogv"
    type="video/ogg">
  <source
    src="{{ ia_url }}.webm"
    type=type='video/webm'>   

</video>
