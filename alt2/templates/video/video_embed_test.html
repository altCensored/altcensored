<!doctype html>

<video controls
data-setup='{ "playbackRates": [0.5, 1, 1.25, 1.5, 1.75, 2] }'
style="outline:none;
    background-color:#000;
    background-size:cover;
    display: inline-block;
    vertical-align: middle;
    background-repeat: no-repeat;
    background-position: 50% 50%;
    margin: 0;
    padding: 0;
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
    height: 100%;
    width: 100%;
    overflow-wrap: break-word;
    word-wrap: break-word;"
>

  <source
    src="{{ video_url }}.webm"
    type='video/webm' />
  <source
    src="{{ video_url }}.mp4"
    type="video/mp4" />
  <source
    src="{{ video_url }}.ogv"
    type="video/ogg" />
  <source
    src="{{ video_url }}.mkv"
    type="video/mp4" />
</video>
