<!DOCTYPE html>

<head>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/darktheme.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/video-js.min.css') }}">

  <style>
    .vjs-button.vjs-control.vjs-next-button {
      position: relative;
      font-size: 2.2em;
      width: 2em;
      cursor: pointer;
    }
    .vjs-big-play-button {
      display: none !important;
    }
  </style>
</head>

<html>
<body>

<video id="video-player" preload="auto" playsinline outline="none" controls
style="outline:none;
    background-color:#000;
    background-size:cover;
    display: inline-block;
    vertical-align: middle;
    background-repeat: no-repeat;
    background-position: 50% 50%;
    margin: 0;
    padding: 0;
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
    height: 100%;
    width: 100%;
    overflow-wrap: break-word;
    word-wrap: break-word;"

    poster="{{ video_url }}.jpg">
  <source
    src="{{ video_url }}.mkv"
    type="video/mp4">
  <source
    src="{{ video_url }}.mp4"
    type="video/mp4">
  <source
    src="{{ video_url }}.ogv"
    type="video/ogg">
  <source
    src="{{ video_url }}.webm"
    type=type='video/webm'>
</video>

<script nonce="{{ csp_nonce() }}" type="text/javascript">
  document.getElementById('video-player').play();
  {% if next_video %}
    document.getElementById('video-player').addEventListener('ended', function(){
    {% if playlist %}
    window.parent.location = "/watch?v={{next_video}}&playlist={{playlist.hashid}}"
    {% elif userlist %}
    window.parent.location = "/watch?v={{next_video}}&userlist={{userlist}}"
    {% else %}
    window.parent.location = "/watch?v={{next_video}}"
    {% endif %}
    });
  {% endif %}
</script>



</body>
</html>
