<!DOCTYPE html>

<head>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/datatables.css') }}">

</head>

{% block content %}
  <div class="row">
    <div class="col-lg-12">
      <table id="dt_110x" class="display" cellspacing="0" width="100%">
        <thead>
          <tr>
            <th>Channel Name</th>
            <th>Total Videos</th>
            <th>Censored</th>
            <th>Created</th>
            <th>Deleted</th>
          </tr>
        </thead>
      <tbody></tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block extra_javascripts %}
  <script src="{{ url_for('static', filename='js/jquery-3.5.1.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/datatables.min.js') }}"></script>

  <script type="text/javascript" charset="utf-8">
    $(document).ready(function () {
      var table = $('#dt_110x').DataTable({
        "processing": true,
        "serverSide": true,
        "ajax": "{{ url_for('channel.data') }}"
      });
    });
  </script>
{% endblock %}
