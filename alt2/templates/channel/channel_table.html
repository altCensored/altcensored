<!DOCTYPE html>

{% extends 'base.html' %}
{% block head %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/datatables.css') }}">
{% endblock %}

{% block content %}
<p><br></p>
<p></p>
<div class="pure-g">
  <div class="pure-u-1 pure-u-md-2-24"></div>
  <div class="pure-u-1 pure-u-md-20-24">
    <div class="pure-g">
      <div class="pure-u-1 pure-u-md-1-1">
        <div class="h-box">

          <div class="row">
            <div class="col-lg-12">
              <table id="channels" class="display" cellspacing="0" width="100%">
                <thead>
                  <tr>
                    <th>Channel Name</th>
                    <th>Channel ID</th>
                    <th>Subscribers</th>
                    <th>Total Views</th>
                    <th>Videos</th>
                    <th>Censored</th>
                    <th>Created</th>
                    <th>Deleted</th>
                  </tr>
                </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
        </div>
      </div>
    </div>
  </div>
</div>


{% block extra_javascripts %}
  <script src="{{ url_for('static', filename='js/jquery-3.5.1.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/datatables.min.js') }}"></script>
  <script type="text/javascript" charset="utf-8">
    $(document).ready(function () {
      var table = $('#channels').DataTable({
        "processing": true,
        "serverSide": true,
        "ajax": "{{ url_for('channel.data') }}",
        "columnDefs": [
            {
                "targets": [ 1 ],
                "visible": false,
                "searchable": false
            }
        ]
      });
    });
  </script>

{% endblock %}
{% endblock %}
