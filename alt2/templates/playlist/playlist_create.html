{% extends 'base.html' %}
{% block head %}

{% endblock %}
{% block content %}

{% with active_nav='auth' %}
    {% include "widgets/navtabs.html" %}
{% endwith %}

<br>
<div class="pure-g">
  <div class="pure-u-1 pure-u-md-2-24"></div>
  <div class="pure-u-1 pure-u-md-20-24">
    <div class="pure-g">
      <div class="pure-u-1 pure-u-md-1-1">
        <div class="h-box">
          Create Playlist
          <hr>
          <form name="create_playlist" method="post">
            <p>{{ gettext('Title') }}:
              <input type=text id=title value=Title name=title maxlength="18">
              <p>
              <p> {{ gettext('Privacy') }}:
              <select name=privacy>
                <option value=Public SELECTED>Public</option>"           
                  <option value=Private>Private</option>"
              </select>
            </p>
            <input type="submit" name="submit" value="{{ gettext('Create Playlist') }}">
          </form>
        </div>
      </div>
    </div>
  </div>
  <div class="pure-u-1 pure-u-md-2-24"></div>
</div>   

{% endblock %}
