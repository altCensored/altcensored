{% extends 'base.html' %}
{% block head %}

{% endblock %}
{% block content %}

{% with active_nav='about' %}
    {% include "widgets/navtabs.html" %}
{% endwith %}

<br>

<div class="pure-g">
  <div class="pure-u-1 pure-u-md-2-24"></div>
  <div class="pure-u-1 pure-u-md-20-24">
    <div class="pure-g">
      <div class="pure-u-1 pure-u-md-1-1">
        <div class="h-box">
            <form class="pure-form pure-form-aligned" name=site method="post" enctype="multipart/form-data">
                    <fieldset>
                        <div class="pure-control-group">
                            <label for="email_status"> {{ gettext('Email Status') }}: </label>
                            <select name=email_status>
                                <option value=admin>{{ gettext('admin') }}</option>"
                                <option value=email_verified>{{ gettext('verified') }}</option>"
                                <option value=email_subscribed>{{ gettext('subscribed') }}</option>"
                            </select>
                        </div>
                        <div class="pure-controls">
                            <p><input type="file" name="file"></p>
                        </div>
                        <div class="pure-controls">
                            <button class="pure-button" type="submit" name="submit" value="login">{{ gettext('Save') }}</button>
                        </div>
                    </fieldset>
            </form>
        </div>
      </div>
    </div>
  </div>
</div>

<p></p>
{% endblock %}
