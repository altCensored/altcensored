{% extends 'base.html' %}
{% block head %}

{% endblock %}
{% block content %}

{% with active_nav='about' %}
    {% include "widgets/navtabs.html" %}
{% endwith %}

<br>

<div class="pure-g">
  <div class="pure-u-1 pure-u-md-2-24"></div>
  <div class="pure-u-1 pure-u-md-20-24">
    <div class="pure-g">
      <div class="pure-u-1 pure-u-md-1-1">
        <div class="h-box">

        <h2>{{title}}</h2>
        <form method=post enctype=multipart/form-data>
          <input type=file name=file>
          <input type=submit value=Return>
          <br><br>          <br><br>
          <label for="service">Service:</label>
          <select name=service>
            <option value=mjet>mjet</option>"
            <option value=sgrid>sgrid</option>"
            <option value=aws>aws</option>"
          </select>
          <br><br>
          <label for="email_status">Recipients:</label>
          <select name=email_status>
            <option value=admin>admin</option>"
            <option value=email_verified>verified</option>"
            <option value=email_subscribed>subscribed</option>"
          </select>
          <br><br>
          <label for="subject">subject:</label>
          <input type="text" name="subject">
        </form>

        </div>
      </div>
    </div>
  </div>
</div>

<p></p>
{% endblock %}
