{% extends 'base.html' %}
{% block head %}

{% endblock %}
{% block content %}

{% with active_nav='about' %}
    {% include "widgets/navtabs.html" %}
{% endwith %}

<br>

<div class="pure-g">
  <div class="pure-u-1 pure-u-md-2-24"></div>
  <div class="pure-u-1 pure-u-md-20-24">
    <div class="pure-g">
      <div class="pure-u-1 pure-u-md-1-1">
        <div class="h-box">

            <form method="post" enctype="multipart/form-data">
                <label for="email_status">Recipients:</label>
                <select name=email_status>
                     <option value=admin>admin</option>"
                     <option value=email_verified>verified</option>"
                     <option value=email_subscribed>subscribed</option>"
                </select>
                <br><br>
                <label for="subject">subject:</label>
                <input type="text" name="subject">
                <br><br>
                <label for="filename">filename:</label>
                <input type="text" name="filename">
                <br><br>
                <input type="submit" value="Submit">

            </form>
        </div>
      </div>
    </div>
  </div>
</div>

<p></p>
{% endblock %}
