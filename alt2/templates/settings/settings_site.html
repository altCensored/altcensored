{% extends 'base.html' %}
{% block head %}

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@altcensored">
    <meta name="twitter:creator" content="@altcensored">

    <meta property="og:description" content="'we show what they hide'">
    <meta property="og:type" content="article">
    <meta property="og:image" content="https://{{ config['MYSERVER_NAME'] }}/logo_clip.png">
    <meta property="og:url" content="https://{{ config['MYSERVER_NAME'] }}">
    <meta property="og:title" content="{{ session.videocount | viewdisplay }}+ Limited State/Deleted Videos; {{ session.delchannelcount | viewdisplay }} Deleted Channels">

{% endblock %}
{% block content %}

    {% with active_nav='settings' %}
        {% include "widgets/navtabs.html" %}
    {% endwith %}
    <br>
    <br>
    <div class="pure-g">
        <div class="pure-u-1 pure-u-md-2-24"></div>
        <div class="pure-u-1 pure-u-md-20-24">
            {% with active_settings='site' %}{% include "widgets/settings_subnav.html" %}{% endwith %}
            <div class="h-box">
                <form class="pure-form pure-form-aligned" name=site method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <fieldset>
                        <div class="pure-control-group">
                            <label for="Language"> {{ gettext('Language') }}: <span class="help-tip" tabindex="0">?<span class="help-balloon">{{ gettext('Choose the display language for the site interface.') }}</span></span></label>
                            <select name=locale>
                                <option value="{{locale}}" SELECTED>{{locale}}</option>"
                                {% for locale in locales %}
                                    <option value="{{locale}}">{{locale}}</option>"
                                {% endfor %}
                            </select>
                        </div>
                        <div class="pure-control-group">
                            <label for="Theme"> {{ gettext('Theme') }}: <span class="help-tip" tabindex="0">?<span class="help-balloon">{{ gettext('Select the colour theme for the site.') }}</span></span></label>
                            <select name=theme>
                                <option value="{{theme}}" SELECTED>{{theme}}</option>"
                                {% for theme in themes %}
                                    <option value="{{theme}}">{{theme}}</option>"
                                {% endfor %}
                            </select>
                        </div>
                        <div class="pure-control-group">
                            <label for="AutoPlay"> {{ gettext('Auto Play') }}: <span class="help-tip" tabindex="0">?<span class="help-balloon">{{ gettext('Automatically start playing a video when its page loads.') }}</span></span></label>
                            <select name=autoplay>
                                <option value="{{session.autoplay}}" SELECTED>{{session.autoplay}}</option>"
                                {% if session.autoplay %}
                                    <option value=False>{{ gettext('False') }}</option>"
                                {% else %}
                                    <option value=True>{{ gettext('True') }}</option>"
                                {% endif %}
                            </select>
                        </div>                        <div class="pure-control-group">
                            <label for="PlayNext"> {{ gettext('Play Next') }}: <span class="help-tip" tabindex="0">?<span class="help-balloon">{{ gettext('After a video ends, automatically navigate to the next one in the list.') }}</span></span></label>
                            <select name=playnext>
                                <option value="{{session.playnext}}" SELECTED>{{session.playnext}}</option>"
                                {% if session.playnext %}
                                    <option value=False>{{ gettext('False') }}</option>"
                                {% else %}
                                    <option value=True>{{ gettext('True') }}</option>"
                                {% endif %}
                            </select>
                        </div>
                        <div class="pure-control-group">
                            <label for="LoopList"> {{ gettext('Loop List') }}: <span class="help-tip" tabindex="0">?<span class="help-balloon">{{ gettext('When the last video in a list ends, start again from the first.') }}</span></span></label>
                            <select name=looplist>
                                <option value="{{session.looplist}}" SELECTED>{{session.looplist}}</option>"
                                {% if session.looplist %}
                                    <option value=False>{{ gettext('False') }}</option>"
                                {% else %}
                                    <option value=True>{{ gettext('True') }}</option>"
                                {% endif %}
                            </select>
                        </div>
                        <div class="pure-control-group">
                            <label for="Menu"> {{ gettext('Menu') }}: <span class="help-tip" tabindex="0">?<span class="help-balloon">{{ gettext('Choose which sections appear in the top navigation bar.') }}</span></span></label>
                            <select name=navtab1_value>
                                <option value="{{navtabs["navtab1"]}}" SELECTED>{{navtabs["navtab1"]}}</option>"
                                {% for navtab1_value in navtab1_values %}
                                    <option value="{{navtab1_value}}">{{navtab1_value}}</option>"
                                {% endfor %}
                            </select>
                            <select name=navtab2_value>
                                <option value="{{navtabs["navtab2"]}}" SELECTED>{{navtabs["navtab2"]}}</option>"
                                {% for navtab2_value in navtab2_values %}
                                    <option value="{{navtab2_value}}">{{navtab2_value}}</option>"
                                {% endfor %}
                            </select>
                            <select name=navtab3_value>
                                <option value="{{navtabs["navtab3"]}}" SELECTED>{{navtabs["navtab3"]}}</option>"
                                {% for navtab3_value in navtab3_values %}
                                    <option value="{{navtab3_value}}">{{navtab3_value}}</option>"
                                {% endfor %}
                            </select>
                        </div>
                        <div class="pure-controls">
                            <button class="pure-button pure-button-primary" type="submit" name="submit" value="login">{{ gettext('Save') }}</button>
                        </div>
                    </fieldset>
                </form>
            </div>
        </div>
    </div>
    </div>
    </div>

{% endblock %}
