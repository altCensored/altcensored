{% extends 'base.html' %}
{% block head %}

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@altcensored">
<meta name="twitter:creator" content="@altcensored">

<meta property="og:description" content="'we show what they hide'">
<meta property="og:type" content="article">
<meta property="og:image" content="https://{{ config['MYSERVER_NAME'] }}/logo_clip.gif">
<meta property="og:url" content="https://{{ config['MYSERVER_NAME'] }}">
<meta property="og:title" content="{{ videocount | viewdisplay }}+ Limited State/Deleted Videos; {{ delchannelcount | viewdisplay }} Deleted Channels">

{% endblock %}
{% block content %}

  <div class="pure-g">
    <div class="pure-u-1 pure-u-md-2-24"></div>
      <div class="pure-u-1 pure-u-md-20-24">
        <div class="pure-g h-box">
          <div class="pure-u-1-4"></div>
            <div class="pure-u-1 pure-u-md-1-2">
              <div class="pure-g">
                <div class="pure-u-1-3">
                  <a href="{{ url_for('video.index') }}" style="text-align:center;" class="pure-menu-heading">
                  {{ gettext('Video') }}
                  </a>
                </div>          
                <div class="pure-u-1-3">
                  <a href="{{ url_for('channel.index') }}" style="text-align:center;" class="pure-menu-heading">
                    {{ gettext('Channel') }}
                  </a>
                </div>       
                <div class="pure-u-1-3">
                  <a href="{{ url_for('category.index') }}" style="text-align:center;" class="pure-menu-heading">
                    {{ gettext('Category') }}
                  </a>
                </div>  
              </div>
            </div>
          <div class="pure-u-1-4"></div>
        </div>
      </div>
    <div class="pure-u-1 pure-u-md-2-24"></div>
  </div>
</div>
</div>

<br>

  <div class="pure-g">
    <div class="pure-u-1 pure-u-md-2-24"></div>
      <div class="pure-u-1 pure-u-md-20-24">
        <div class="pure-g">

            <div class="pure-u-1 pure-u-md-1-1">
              <div class="h-box">

                <form name=get_language method="post">
                  <p> {{ gettext('Language') }}:
                  <select name=locale>
                    <option value= "{{locale}}" SELECTED>{{locale}}</option>" 
                    {% for language in languages %}
                    <option value= "{{language}}">{{language}}</option>"
                    {% endfor %}
                  </select>
                  <input type="submit" name="submit" value="{{ gettext('Save') }}">
                </form>
                {% if session.user %}
                <br>
                <a href="{{ url_for('history.index') }}">
                    {{ gettext('Watch History') }}
                </a>
                {% endif %}
              </div>
            </div>

        </div>
      </div>
    <div class="pure-u-1 pure-u-md-2-24"></div>
  </div>   

{% endblock %}
